name: Build Video Transcoder (Desktop)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/video/transcoder/**'
      - 'src/mediatools/video/transcoder/**'
      - '.github/workflows/build-vtr-desktop.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/video/transcoder/**'
      - 'src/mediatools/video/transcoder/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================================
  # Job 1: Generate version info from app's version.txt
  # ============================================================================
  generate-version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_tag: ${{ steps.version.outputs.build_tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and generate build info
        id: version
        run: |
          # Read app version
          APP_VERSION=$(cat src/mediatools/video/transcoder/data/version.txt)
          BUILD_NUM=$(git rev-list --count HEAD)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          FULL_VERSION="${APP_VERSION}-build.${BUILD_NUM}"
          BUILD_TAG="vtr-v${APP_VERSION}-build.${BUILD_NUM}+${COMMIT_HASH}"
          
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "build_tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          
          # Only release on main branch push
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          
          echo "📦 App Version: $APP_VERSION"
          echo "🏷️  Full Version: $FULL_VERSION"
          echo "🔖 Build Tag: $BUILD_TAG"

  # ============================================================================
  # Job 2: Windows Builds
  # ============================================================================
  build-windows-onedir:
    runs-on: windows-latest
    needs: generate-version
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Windows-specific dependencies
      run: |
        pip install winshell pywin32

    - name: Build Windows Portable (--onedir)
      shell: bash
      run: |
        cd apps/video/transcoder/build
        chmod +x build_onedir.sh
        ./build_onedir.sh
        
    - name: Create Windows Portable ZIP
      run: |
        $mainFolder = "mt-vtr-Windows-Portable"
        New-Item -ItemType Directory -Path $mainFolder -Force
        Copy-Item -Path "apps\video\transcoder\build\dist\mt-vtr\*" -Destination $mainFolder\ -Recurse -Force
        Compress-Archive -Path "$mainFolder" -DestinationPath "mt-vtr-Windows-Portable.zip" -Force
        Remove-Item -Recurse -Force $mainFolder
        
    - name: Upload Windows Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mt-vtr-Windows-Portable
        path: mt-vtr-Windows-Portable.zip

  build-windows-onefile:
    runs-on: windows-latest
    needs: generate-version
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Windows-specific dependencies
      run: |
        pip install winshell pywin32

    - name: Build Windows Single File (--onefile)
      shell: bash
      run: |
        cd apps/video/transcoder/build
        chmod +x build_onefile.sh
        ./build_onefile.sh
        
    - name: Upload Windows Single File Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mt-vtr-Windows.exe
        path: apps/video/transcoder/build/dist/mt-vtr.exe

  # ============================================================================
  # Job 3: Linux Builds
  # ============================================================================
  build-linux-onedir:
    runs-on: ubuntu-latest
    needs: generate-version
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Linux Portable (--onedir)
      run: |
        cd apps/video/transcoder/build
        chmod +x build_onedir.sh
        ./build_onedir.sh
        
    - name: Create Linux Portable ZIP
      run: |
        mkdir -p mt-vtr-Linux-Portable
        cp -r apps/video/transcoder/build/dist/mt-vtr/* mt-vtr-Linux-Portable/
        zip -r mt-vtr-Linux-Portable.zip mt-vtr-Linux-Portable/
        rm -rf mt-vtr-Linux-Portable
        
    - name: Upload Linux Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mt-vtr-Linux-Portable
        path: mt-vtr-Linux-Portable.zip

  build-linux-onefile:
    runs-on: ubuntu-latest
    needs: generate-version
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Linux Single File (--onefile)
      run: |
        cd apps/video/transcoder/build
        chmod +x build_onefile.sh
        ./build_onefile.sh
        
    - name: Upload Linux Single File Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mt-vtr-Linux
        path: apps/video/transcoder/build/dist/mt-vtr

  # ============================================================================
  # Job 6: Create/Update Release (only if all builds succeed on main branch)
  # ============================================================================
  create-release:
    runs-on: ubuntu-latest
    needs: [generate-version, build-windows-onedir, build-windows-onefile, build-linux-onedir, build-linux-onefile]
    if: needs.generate-version.outputs.should_release == 'true'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Display downloaded files
      run: ls -R artifacts/
      
    - name: Prepare release files
      run: |
        # Copy and rename files
        cp artifacts/mt-vtr-Linux-Portable/mt-vtr-Linux-Portable.zip .
        cp artifacts/mt-vtr-Windows-Portable/mt-vtr-Windows-Portable.zip .
        cp artifacts/mt-vtr-Windows.exe/mt-vtr.exe mt-vtr-Windows.exe
        cp artifacts/mt-vtr-Linux/mt-vtr mt-vtr-Linux
        
        # Make Linux executable executable
        chmod +x mt-vtr-Linux
        
        echo "✅ Release files prepared:"
        ls -la mt-vtr-Windows-Portable.zip mt-vtr-Windows.exe mt-vtr-Linux-Portable.zip mt-vtr-Linux
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: transcoder-latest
        name: "MediaTools Video Transcoder - v${{ needs.generate-version.outputs.version }}"
        make_latest: true
        fail_on_unmatched_files: true
        body: |
          # MediaTools Video Transcoder
          
          **Version:** ${{ needs.generate-version.outputs.version }}
          **Build Tag:** `${{ needs.generate-version.outputs.build_tag }}`
          **Commit:** ${{ github.sha }}
          
          ---
          
          ## ✅ All Builds Passed
          
          This release is automatically updated only when **all builds succeed**:
          - ✅ Windows executable builds passed
          - ✅ Linux executable builds passed
          
          ---
          
          ## 📥 Available Downloads
          
          ### Windows
          1. **mt-vtr-Windows-Portable.zip** - Portable folder (--onedir)
            - Contains `mt-vtr.exe` + all dependencies
            - Extract and run `mt-vtr.exe`
            
          2. **mt-vtr-Windows.exe** - Single executable (--onefile)
            - Single file, self-contained
            - Run directly
            
          ### Linux
          3. **mt-vtr-Linux-Portable.zip** - Portable folder (--onedir)
            - Contains `mt-vtr` binary + all dependencies
            - Extract and run `./mt-vtr`
            
          4. **mt-vtr-Linux** - Single executable (--onefile)
            - Single binary file
            - Run with `./mt-vtr`
          
          ### Docker
          ```bash
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/video-transcoder:latest
          docker pull ghcr.io/${{ github.repository_owner }}/video-transcoder:latest
          ```
          
          ---
          
          ## Usage Notes
          - Windows: May trigger antivirus (false positive)
          - Linux: Make executable with `chmod +x mt-vtr-Linux`
          - Portable versions are recommended for better performance
          
        files: |
          mt-vtr-Windows-Portable.zip
          mt-vtr-Windows.exe
          mt-vtr-Linux-Portable.zip
          mt-vtr-Linux
